<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RME Course Materials</title>
<style>
  :root{
    --bg:#14161a;
    --sidebar:#1b1e24;
    --panel:#22262e;
    --line:#31363f;
    --text:#e8e6e1;
    --muted:#9aa0a8;
    --accent:#e8862e;
    --accent-dim:#7a4a1e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);
    display:flex;height:100vh;overflow:hidden;
  }

  /* ---------- Sidebar ---------- */
  #sidebar{
    width:320px;min-width:320px;background:var(--sidebar);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow-y:auto;
  }
  #sidebar header{
    padding:22px 20px 18px;border-bottom:1px solid var(--line);
  }
  #sidebar header h1{
    font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  }
  #sidebar header p{
    font-size:12px;color:var(--muted);margin-top:4px;
  }
  .course{border-bottom:1px solid var(--line)}
  .course-btn{
    width:100%;text-align:left;background:none;border:none;cursor:pointer;
    padding:16px 20px;color:var(--text);
    display:flex;align-items:flex-start;gap:12px;
  }
  .course-btn:hover{background:#20242b}
  .course-btn .code{
    font-family:"Consolas","Courier New",monospace;font-size:12px;
    color:var(--accent);white-space:nowrap;padding-top:2px;
  }
  .course-btn .name{font-size:14px;line-height:1.35;flex:1}
  .course-btn .chev{
    color:var(--muted);font-size:11px;padding-top:3px;
    transition:transform .2s ease;
  }
  .course.open .course-btn .chev{transform:rotate(90deg)}
  .tabs{display:none;padding:2px 0 10px}
  .course.open .tabs{display:block}
  .tab{
    display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    padding:9px 20px 9px 52px;font-size:13px;color:var(--muted);
    border-left:3px solid transparent;
  }
  .tab:hover{color:var(--text);background:#20242b}
  .tab.active{
    color:var(--text);border-left-color:var(--accent);background:#262b33;
  }
  .tab.empty{cursor:default;font-style:italic}
  .tab.empty:hover{color:var(--muted);background:none}

  /* ---------- Content ---------- */
  #content{flex:1;display:flex;flex-direction:column;min-width:0}
  #topbar{
    padding:14px 24px;border-bottom:1px solid var(--line);
    background:var(--panel);font-size:14px;min-height:49px;
    display:flex;align-items:center;gap:10px;
  }
  #topbar .crumb-code{
    font-family:"Consolas","Courier New",monospace;font-size:12px;color:var(--accent);
  }
  #topbar .crumb-sep{color:var(--muted)}
  #viewer{flex:1;background:#0e0f12}
  #viewer iframe{width:100%;height:100%;border:none;display:block}
  #placeholder{
    height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;color:var(--muted);
  }
  #placeholder .mark{
    font-family:"Consolas","Courier New",monospace;font-size:13px;
    color:var(--accent-dim);letter-spacing:.2em;
  }
  #placeholder p{font-size:14px}

  /* ---------- Mobile ---------- */
  #menu-toggle{display:none}
  @media (max-width:760px){
    #sidebar{
      position:fixed;inset:0 auto 0 0;z-index:20;
      transform:translateX(-100%);transition:transform .25s ease;
    }
    #sidebar.show{transform:translateX(0)}
    #menu-toggle{
      display:inline-block;background:none;border:1px solid var(--line);
      color:var(--text);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:13px;
    }
  }
</style>
</head>
<body>

<nav id="sidebar">
  <header>
    <h1>RME Course Materials</h1>
    <p>Robotics &amp; Mechatronics Engineering, DU</p>
  </header>
  <div id="course-list"></div>
</nav>

<main id="content">
  <div id="topbar">
    <button id="menu-toggle">Menu</button>
    <span id="crumb"><span class="crumb-sep">Select a course from the menu</span></span>
  </div>
  <div id="viewer">
    <div id="placeholder">
      <div class="mark">RME / DU</div>
      <p>Open a course and pick a lecture to view its PDF.</p>
    </div>
  </div>
</main>

<script>
// Add or remove PDFs here. "file" is the filename in the repo root next to index.html.
const courses = [
  {
    code: "RME 4226",
    name: "Machine Design and System Dynamics",
    tabs: []
  },
  {
    code: "RME 4201",
    name: "Human Robot Interaction",
    tabs: [
      { title: "1. Introduction",   file: "1__Introduction.pdf" },
      { title: "2. Design and HRI", file: "2__Design_and_HRI.pdf" }
    ]
  },
  {
    code: "RME 4221",
    name: "Introduction to Machine Learning",
    tabs: []
  },
  {
    code: "RME 4231",
    name: "Introduction to Machine Learning Lab",
    tabs: []
  }
];

const listEl = document.getElementById("course-list");
const viewer = document.getElementById("viewer");
const crumb  = document.getElementById("crumb");
const sidebar = document.getElementById("sidebar");

courses.forEach((course, ci) => {
  const wrap = document.createElement("div");
  wrap.className = "course";

  const btn = document.createElement("button");
  btn.className = "course-btn";
  btn.innerHTML = `<span class="chev">&#9656;</span>
                   <span class="code">${course.code}</span>
                   <span class="name">${course.name}</span>`;
  btn.addEventListener("click", () => {
    const isOpen = wrap.classList.contains("open");
    document.querySelectorAll(".course.open").forEach(c => c.classList.remove("open"));
    if (!isOpen) wrap.classList.add("open");
  });
  wrap.appendChild(btn);

  const tabs = document.createElement("div");
  tabs.className = "tabs";

  if (course.tabs.length === 0) {
    const t = document.createElement("button");
    t.className = "tab empty";
    t.textContent = "No materials uploaded yet";
    tabs.appendChild(t);
  } else {
    course.tabs.forEach(tab => {
      const t = document.createElement("button");
      t.className = "tab";
      t.textContent = tab.title;
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab.active").forEach(x => x.classList.remove("active"));
        t.classList.add("active");
        openPdf(course, tab);
      });
      tabs.appendChild(t);
    });
  }
  wrap.appendChild(tabs);
  listEl.appendChild(wrap);
});

function openPdf(course, tab) {
  crumb.innerHTML = `<span class="crumb-code">${course.code}</span>
                     <span class="crumb-sep">/</span> ${tab.title}`;
  viewer.innerHTML = `<iframe src="${encodeURI(tab.file)}" title="${tab.title}"></iframe>`;
  if (window.innerWidth <= 760) sidebar.classList.remove("show");
}

document.getElementById("menu-toggle").addEventListener("click", () => {
  sidebar.classList.toggle("show");
});
</script>

</body>
</html>
